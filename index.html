<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landscape Slider</title>

  <!-- Swiper CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Arial, sans-serif;
    }

    .swiper {
      width: 100%;
      height: 100%;
    }

    .swiper-wrapper,
    .swiper-slide {
      height: 100%;
    }

    .swiper-slide {
      position: relative;
    }

    .swiper-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;

      transform: scale(1);
      transition: transform 6s ease;
    }

    .swiper-slide-active img {
      transform: scale(1.05);
    }

    .overlay {
      position: absolute;
      bottom: 40px;
      left: 40px;
      color: white;
      font-size: 28px;
      background: rgba(0,0,0,0.4);
      padding: 10px 20px;
      border-radius: 4px;
    }

    .swiper-pagination {
      bottom: 20px !important;
    }

    .swiper-pagination-bullet {
      background: white;
      opacity: 0.7;
    }

    .swiper-pagination-bullet-active {
      opacity: 1;
    }

    /* ARROWS */
    .swiper-button-next,
    .swiper-button-prev {
      color: white;
      width: 50px;
      height: 50px;
      background: rgba(0,0,0,0.4);
      border-radius: 50%;
      backdrop-filter: blur(4px);
    }

    .swiper-button-next::after,
    .swiper-button-prev::after {
      font-size: 16px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="swiper">
  <div class="swiper-wrapper">

    <div class="swiper-slide">
      <img src="images/landscape-01-01.png">
      <div class="overlay">Existing Condition</div>
    </div>

    <div class="swiper-slide">
      <img src="images/landscape-01-02.png">
    </div>

    <div class="swiper-slide">
      <img src="images/landscape-01-03.png">
    </div>

    <div class="swiper-slide">
      <img src="images/landscape-01-04.png">
      <div class="overlay">Concept Development</div>
    </div>

    <div class="swiper-slide">
      <img src="images/landscape-01-05.png">
    </div>

    <div class="swiper-slide">
      <img src="images/landscape-01-06.png">
    </div>

    <div class="swiper-slide">
      <img src="images/landscape-01-07.png">
    </div>

    <div class="swiper-slide">
      <img src="images/landscape-01-08.png">
    </div>

    <div class="swiper-slide">
      <img src="images/landscape-01-09.png">
      <div class="overlay">Final Design Vision</div>
    </div>

  </div>

  <!-- Pagination -->
  <div class="swiper-pagination"></div>

  <!-- Arrows -->
  <div class="swiper-button-prev"></div>
  <div class="swiper-button-next"></div>

</div>

<!-- Swiper JS -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
  const swiper = new Swiper('.swiper', {
    loop: true,
    effect: 'fade',
    fadeEffect: {
      crossFade: true
    },
    autoplay: {
      delay: 5000,
      disableOnInteraction: false,
    },
    pagination: {
      el: '.swiper-pagination',
      clickable: true,
    },
    navigation: {
      nextEl: '.swiper-button-next',
      prevEl: '.swiper-button-prev',
    },
  });
</script>

</body>
</html>
